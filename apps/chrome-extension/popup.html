<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      width: 320px;
      margin: 0;
      padding: 16px;
      background: #fafafa;
      color: #333;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    .header svg {
      width: 24px;
      height: 24px;
      color: #2563eb;
    }
    h1 {
      font-size: 16px;
      margin: 0;
      font-weight: 600;
    }
    .description {
      font-size: 13px;
      color: #555;
      line-height: 1.5;
      margin-bottom: 20px;
    }
    .input-group {
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      margin-bottom: 6px;
      color: #444;
    }
    input {
      width: 100%;
      box-sizing: border-box;
      padding: 8px 10px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      outline: none;
      font-size: 13px;
    }
    input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2);
    }
    .btn {
      width: 100%;
      padding: 10px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
    }
    .btn:hover {
      background: #1d4ed8;
    }
    .btn:disabled {
      background: #93c5fd;
      cursor: not-allowed;
    }
    .status {
      margin-top: 16px;
      font-size: 13px;
      text-align: center;
      font-weight: 500;
      display: none;
    }
    .status.success { color: #16a34a; display: block; }
    .status.error { color: #dc2626; display: block; }
    
    /* Small spinner */
    @keyframes spin { 100% { transform: rotate(360deg); } }
    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 1s linear infinite;
      display: none;
    }
    .btn.loading .spinner { display: block; }
    .btn.loading .text { display: none; }
  </style>
</head>
<body>
  <div class="header">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
      <polyline points="10 17 15 12 10 7"></polyline>
      <line x1="15" y1="12" x2="3" y2="12"></line>
    </svg>
    <h1>Agent John Wick</h1>
  </div>

  <div class="description">
    Connect your active Google Session to Agent John Wick.
  </div>

  <div class="input-group">
    <label for="serverUrl">Agent Server URL</label>
    <input type="text" id="serverUrl" placeholder="http://127.0.0.1:4001" value="http://127.0.0.1:4001" />
  </div>

  <button id="syncBtn" class="btn">
    <div class="spinner"></div>
    <span class="text">Sync Google Account</span>
  </button>

  <div id="statusMsg" class="status"></div>

  <script src="popup.js"></script>
</body>
</html>
